# Linting: black, isort, flake8 (runs quickly on PRs)
name: Lint
on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black==24.* isort flake8

      - name: Run black (check)
        run: |
          black --check .

      - name: Run isort (check)
        run: |
          isort --check-only .

      - name: Run flake8
        run: |
          flake8 .
