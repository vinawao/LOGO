# Python CI: run tests on multiple Python versions and cache pip/poetry
name: Python CI
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.10, 3.9]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If you use requirements.txt:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # If you're using Poetry (pyproject.toml with [tool.poetry]):
          if [ -f pyproject.toml ] && grep -q '\[tool.poetry\]' pyproject.toml 2>/dev/null; then
            python -m pip install poetry
            poetry install --no-interaction --no-root
          fi

      - name: Run tests
        run: |
          # adjust command if you use tox or another runner
          pytest -q

      - name: Upload coverage to Codecov (optional)
        if: success() && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
