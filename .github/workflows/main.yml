# This workflow is called
Name: Vavoo Channel List Updater

front:
  # It runs automatically every 30 minutes.
  # (Set to 30 minutes instead of 5 minutes to avoid straining the server; you can change it.)
  schedule:
    - cron: '*/59 * * * *'
  
  # Enables manual execution from the GitHub interface.
  workflow_dispatch:

jobs:
  # We define a job named "build"
  build:
    # It will run on the latest Ubuntu virtual machine.
    runs-on:ubuntu-latest
    
    # This indicates that this job has permission to write code (commit) to the repository.
    permissions:
      contents: write

    steps:
      # Step 1: Download the code from the repository to the virtual machine.
      - name: Checkout repository
        uses: actions/checkout@v4

      Step 2: Install the specified Python version (3.10)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Installs the necessary Python library (requests).
      # This step will resolve your error.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Step 4: Run the Vavoo scraper script
      - name: Run Vavoo Scraper
        run: python vavoo_scraper.py

      # Step 5: Commit and push the generated file (vavoo_channels.m3u8) to the repository.
      - name: Commit and Push changes
        run: |
          # Set up bot ID for Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only attach the file we created.
          git add vavoo_kanallar.m3u8
          
          # Check if there have been any changes.
          if git diff --staged --quiet; then
            echo "No changes found, commit not working."
          else
            # If there are any changes, commit and push.
            echo "Changes found, committing..."
            git commit -m "📺 Automatically updated Vavoo channel list"
            git push
          fi
